<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금융 마인드맵</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-red: #ff6b6b;
            --accent-blue: #4dabf7;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Header Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(12px);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            color: #fff;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Physics Container */
        #physics-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* DOM Nodes Overlay */
        #nodes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 50%;

            /* Premium 3D Glass Effect */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.3);

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.05);

            color: #fff;
            pointer-events: auto;
            user-select: none;
            transform: translate(-50%, -50%);
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .node:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            z-index: 100;
            cursor: grab;
        }

        .node:active {
            cursor: grabbing;
        }

        .node.central {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            z-index: 20;
        }

        /* Typography */
        .node-title {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .node-value {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            line-height: 1.1;
        }

        .node-change {
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }

        /* Group Node Styling */
        .node-group-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 85%;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .group-item:last-child {
            border-bottom: none;
        }

        .group-label {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-align: left;
            flex: 1;
        }

        .group-val {
            font-weight: 700;
            font-size: 1rem;
            text-align: right;
        }

        /* USA Rates Extra Column */
        .group-change-col {
            font-size: 0.75rem;
            text-align: right;
            margin-left: 10px;
            opacity: 0.9;
            min-width: 80px;
        }

        /* Date Info */
        .date-info {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
            font-weight: 400;
        }

        /* Colors */
        .up {
            color: var(--accent-red);
        }

        .down {
            color: var(--accent-blue);
        }

        /* SVG Lines */
        #lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        line {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 2;
            stroke-linecap: round;
        }

        /* Loading Animation */
        @keyframes shimmer {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .loading {
            animation: shimmer 1.5s infinite;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    <header>
        <button class="nav-btn active" onclick="switchCategory('stocks')">미국 증시</button>
        <button class="nav-btn" onclick="switchCategory('economy')">실물경제</button>
        <button class="nav-btn" onclick="switchCategory('rates')">금리</button>
        <button class="nav-btn" onclick="switchCategory('exchange')">환율</button>
    </header>

    <div id="physics-container"></div>
    <svg id="lines-svg"></svg>
    <div id="nodes-container"></div>

    <script>
        // --- Configuration ---
        const API_BASE_URL = 'https://usa-invest.onrender.com/api/finance/';

        const CATEGORIES = {
            stocks: {
                title: "미국 증시",
                type: 'grouped',
                groups: [
                    {
                        id: 'us_market',
                        label: '미국 3대 지수',
                        radius: 170, // Increased for extra column
                        items: [
                            { id: 'sp_futures', label: 'S&P 500' },
                            { id: 'dow_futures', label: 'DOW' },
                            { id: 'nasdaq_futures', label: 'NASDAQ' }
                        ]
                    },
                    {
                        id: 'vix_group',
                        label: '변동성 지수',
                        radius: 80,
                        items: [
                            { id: 'vix', label: 'VIX' }
                        ]
                    },
                    {
                        id: 'fg_group',
                        label: '투자 심리',
                        radius: 80,
                        items: [
                            { id: 'fear_greed', label: '공포&탐욕' }
                        ]
                    }
                ]
            },
            economy: {
                title: "실물경제",
                type: 'single',
                items: [
                    { id: 'cci', label: '소비자신뢰' },
                    { id: 'pmi', label: '제조업 PMI' },
                    { id: 'unemployment', label: '실업률' },
                    { id: 'non_farm', label: '고용지수' }
                ]
            },
            rates: {
                title: "주요 금리",
                type: 'grouped',
                groups: [
                    {
                        id: 'usa',
                        label: '미국 (USA)',
                        radius: 170, // Increased for extra column
                        items: [
                            { id: 'us_10y', label: '10년물' },
                            { id: 'us_2y', label: '2년물' },
                            { id: 'us_10_2_spread', label: '10-2년차' },
                            { id: 'fed_rate', label: '기준금리' }
                        ]
                    },
                    {
                        id: 'japan',
                        label: '일본 (JPN)',
                        radius: 90,
                        items: [
                            { id: 'jp_2y', label: '2년물' },
                            { id: 'jp_policy', label: '정책금리' }
                        ]
                    },
                    {
                        id: 'korea',
                        label: '한국 (KOR)',
                        radius: 135,
                        items: [
                            { id: 'kr_10y', label: '10년물' },
                            { id: 'kr_2y', label: '2년물' },
                            { id: 'kr_base', label: '기준금리' }
                        ]
                    },
                    {
                        id: 'sofr',
                        label: 'SOFR',
                        radius: 70,
                        items: [
                            { id: 'sofr', label: 'SOFR' }
                        ]
                    }
                ]
            },
            exchange: {
                title: "환율",
                type: 'single',
                items: [
                    { id: 'dxy', label: '달러인덱스' },
                    { id: 'usd_krw', label: '원/달러' },
                    { id: 'usdc', label: 'USDC' },
                    { id: 'cds', label: 'CDS' },
                    { id: 'forex_res', label: '외환보유고' },
                    { id: 'foreign_bond', label: '외국인채권' }
                ]
            }
        };

        let currentCategory = 'stocks';
        let engine, world, runner;
        let centralBody;
        let dataBodies = [];
        let mouseConstraint;

        // --- Storage Helper ---
        const STORAGE_KEY = 'gravity_dashboard_positions_v1';

        function getSavedPositions() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch (e) {
                return {};
            }
        }

        function saveNodePosition(category, id, position, center) {
            const saved = getSavedPositions();
            if (!saved[category]) saved[category] = {};

            saved[category][id] = {
                dx: position.x - center.x,
                dy: position.y - center.y
            };

            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        }

        // --- Matter.js Setup ---
        function initPhysics() {
            const { Engine, World, Bodies, Runner, Mouse, MouseConstraint, Composite, Events } = Matter;

            engine = Engine.create();
            world = engine.world;

            engine.world.gravity.y = 0;
            engine.world.gravity.x = 0;

            runner = Runner.create();
            Runner.run(runner, engine);

            const mouse = Mouse.create(document.body);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.1,
                    render: { visible: false }
                }
            });
            Composite.add(world, mouseConstraint);

            Events.on(mouseConstraint, 'enddrag', function (event) {
                const body = event.body;
                const dataNode = dataBodies.find(n => n.body === body);

                if (dataNode && centralBody) {
                    saveNodePosition(currentCategory, dataNode.item.id, body.position, centralBody.position);
                    const dist = Matter.Vector.magnitude(Matter.Vector.sub(body.position, centralBody.position));
                    if (dataNode.constraint) {
                        dataNode.constraint.length = dist;
                    }
                }
            });

            document.body.addEventListener('contextmenu', (e) => e.preventDefault());
            requestAnimationFrame(update);
        }

        // --- Node Creation ---
        function createNodes() {
            const { Bodies, Composite, Constraint } = Matter;

            const bodiesToRemove = Composite.allBodies(world).filter(b => b !== centralBody);
            Composite.clear(world, false);
            Composite.add(world, mouseConstraint);
            dataBodies = [];

            const container = document.getElementById('nodes-container');
            container.innerHTML = '';

            const width = window.innerWidth;
            const height = window.innerHeight;

            // 1. Central Node
            const centralRadius = 95;
            centralBody = Bodies.circle(width / 2, height / 2, centralRadius, {
                isStatic: true,
                label: 'central'
            });
            Composite.add(world, centralBody);

            const centralEl = document.createElement('div');
            centralEl.className = 'node central';
            centralEl.style.width = `${centralRadius * 2}px`;
            centralEl.style.height = `${centralRadius * 2}px`;

            const today = new Date();
            const dateStr = `${today.getMonth() + 1}/${today.getDate()}`;

            centralEl.innerHTML = `
                <div class="node-title" style="font-size: 1.2rem; color: #fff; opacity: 0.9; margin-bottom: 0;">${dateStr}</div>
                <div class="node-value" style="font-size: 1.8rem; margin-top: 5px;">${CATEGORIES[currentCategory].title}</div>
            `;
            centralEl.id = 'node-central';
            container.appendChild(centralEl);

            // 2. Data Nodes
            const categoryConfig = CATEGORIES[currentCategory];
            const orbitRadius = Math.min(width, height) * 0.3;
            const savedPositions = getSavedPositions()[currentCategory] || {};

            if (categoryConfig.type === 'single') {
                const items = categoryConfig.items;
                items.forEach((item, index) => {
                    createOrbitingNode(item, index, items.length, orbitRadius, 70, 'single', savedPositions[item.id]);
                });
            } else if (categoryConfig.type === 'grouped') {
                const groups = categoryConfig.groups;
                groups.forEach((group, index) => {
                    createOrbitingNode(group, index, groups.length, orbitRadius, group.radius, 'grouped', savedPositions[group.id]);
                });
            }

            fetchData(currentCategory);
        }

        function createOrbitingNode(dataItem, index, total, orbitRadius, radius, type, savedPos) {
            const { Bodies, Composite, Constraint } = Matter;
            const width = window.innerWidth;
            const height = window.innerHeight;

            let x, y, constraintLength;

            if (savedPos) {
                x = (width / 2) + savedPos.dx;
                y = (height / 2) + savedPos.dy;
                constraintLength = Math.sqrt(savedPos.dx * savedPos.dx + savedPos.dy * savedPos.dy);
            } else {
                const angle = (index / total) * 2 * Math.PI - (Math.PI / 2);
                x = width / 2 + Math.cos(angle) * orbitRadius;
                y = height / 2 + Math.sin(angle) * orbitRadius;
                constraintLength = orbitRadius;
            }

            const body = Bodies.circle(x, y, radius, {
                frictionAir: 0.3,
                restitution: 0.2,
                density: 0.01,
                label: dataItem.id
            });

            const constraint = Constraint.create({
                bodyA: centralBody,
                bodyB: body,
                stiffness: 0.005,
                damping: 0.1,
                length: constraintLength
            });

            Composite.add(world, [body, constraint]);

            const el = document.createElement('div');
            el.className = 'node';
            el.id = `node-${dataItem.id}`;
            el.style.width = `${radius * 2}px`;
            el.style.height = `${radius * 2}px`;

            if (type === 'single') {
                el.innerHTML = `
                    <div class="node-title">${dataItem.label}</div>
                    <div class="node-value loading">...</div>
                `;
            } else {
                // Grouped Layout
                let listHtml = dataItem.items.map(sub => `
                    <div class="group-item" id="val-${sub.id}">
                        <span class="group-label">${sub.label}</span>
                        <span class="group-val loading">...</span>
                        ${(dataItem.id === 'usa' || dataItem.id === 'us_market') ? '<span class="group-change-col"></span>' : ''}
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="node-title" style="margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; width: 90%; font-weight: 700;">${dataItem.label}</div>
                    <div class="node-group-list">
                        ${listHtml}
                    </div>
                `;
            }

            document.getElementById('nodes-container').appendChild(el);

            dataBodies.push({
                body,
                item: dataItem,
                elementId: `node-${dataItem.id}`,
                type,
                constraint
            });
        }

        // --- Data Fetching ---
        async function fetchData(category) {
            try {
                const response = await fetch(`${API_BASE_URL}${category}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                updateNodesWithData(data);
            } catch (error) {
                console.error("Fetch error:", error);
                updateNodesWithError();
            }
        }

        function updateNodesWithData(data) {
            dataBodies.forEach(({ item, elementId, type }) => {
                const el = document.getElementById(elementId);
                if (!el) return;

                if (type === 'single') {
                    const key = item.id;
                    const valObj = data[key] || data[item.label];

                    if (valObj) {
                        let { value, change, date, next_date } = parseValue(valObj);
                        let directionClass = getDirectionClass(change);
                        let changeHtml = directionClass ? `<span class="${directionClass}">${change}</span>` : change;

                        let htmlContent = `<div class="node-title">${item.label}</div>`;

                        // Economy & Exchange with Dates
                        if (currentCategory === 'economy' || (currentCategory === 'exchange' && (date || next_date))) {
                            htmlContent += `<div class="node-value ${directionClass}">${value}</div>`;

                            let dateHtml = '';
                            if (date) dateHtml += `<div>${date}</div>`;
                            if (next_date) dateHtml += `<div>다음: ${next_date}</div>`;

                            if (dateHtml) {
                                htmlContent += `<div class="date-info">${dateHtml}</div>`;
                            } else {
                                htmlContent += `<div class="node-change">${changeHtml}</div>`;
                            }
                        } else if (item.id === 'usdc') {
                            // USDC Special Case: Value Only
                            htmlContent += `<div class="node-value">${value}</div>`;
                        } else {
                            htmlContent += `<div class="node-value ${directionClass}">${value}</div>`;
                            htmlContent += `<div class="node-change">${changeHtml}</div>`;
                        }
                        el.innerHTML = htmlContent;
                    } else {
                        el.innerHTML = `<div class="node-title">${item.label}</div><div class="node-value">N/A</div>`;
                    }

                } else {
                    // Grouped Nodes
                    item.items.forEach(subItem => {
                        const row = el.querySelector(`#val-${subItem.id}`);
                        if (!row) return;

                        const valEl = row.querySelector('.group-val');
                        const changeCol = row.querySelector('.group-change-col');

                        const key = subItem.id;
                        const valObj = data[key] || data[subItem.label];

                        if (valObj) {
                            let { value, change, percent, is_percent, raw_change, raw_percent } = valObj;

                            // Normalize numeric values for calculation
                            let numChange = (raw_change !== undefined) ? raw_change : change;
                            let numPercent = (raw_percent !== undefined) ? raw_percent : percent;

                            // USA Special Formatting (Rates & Stocks)
                            if (item.id === 'usa' || item.id === 'us_market') {
                                // Value
                                let displayVal = value;
                                if (is_percent) displayVal += '%'; // Fed Rate

                                valEl.innerText = displayVal;
                                valEl.className = 'group-val'; // Reset color
                                valEl.classList.remove('loading');

                                // Change Column
                                if (changeCol) {
                                    let dir = getDirectionClass(numChange);
                                    let sign = numChange > 0 ? '▲' : (numChange < 0 ? '▼' : '');
                                    let absChange = Math.abs(numChange).toFixed(2);
                                    let absPercent = Math.abs(numPercent).toFixed(2);

                                    changeCol.innerHTML = `${sign} ${absChange}/${absPercent}%`;
                                    changeCol.className = `group-change-col ${dir}`;
                                }
                            } else {
                                // Asia (Japan/Korea) - All Percent
                                let displayVal = value;
                                // Add % if not already there (simple check)
                                if (!displayVal.toString().includes('%')) displayVal += '%';

                                let dir = getDirectionClass(numChange);

                                valEl.innerText = displayVal;
                                valEl.className = `group-val ${dir}`;
                                valEl.classList.remove('loading');
                            }
                        } else {
                            valEl.innerText = 'N/A';
                            valEl.classList.remove('loading');
                        }
                    });
                }
            });
        }

        function parseValue(valObj) {
            let value = valObj.value || 'N/A';
            let change = valObj.change || '';
            let date = valObj.date || '';
            let next_date = valObj.next_date || '';
            return { value, change, date, next_date };
        }

        function getDirectionClass(change) {
            if (!change) return '';
            let s = change.toString();
            if (s.includes('+') || s.includes('▲') || (typeof change === 'number' && change > 0)) return 'up';
            if (s.includes('-') || s.includes('▼') || (typeof change === 'number' && change < 0)) return 'down';
            return '';
        }

        function updateNodesWithError() {
            dataBodies.forEach(({ elementId, type, item }) => {
                const el = document.getElementById(elementId);
                if (!el) return;

                if (type === 'single') {
                    el.innerHTML = `
                        <div class="node-title">${item.label}</div>
                        <div class="node-value" style="color: rgba(255,255,255,0.3);">N/A</div>
                    `;
                } else {
                    item.items.forEach(subItem => {
                        const subEl = el.querySelector(`#val-${subItem.id} .group-val`);
                        if (subEl) {
                            subEl.innerText = 'N/A';
                            subEl.style.color = 'rgba(255,255,255,0.3)';
                            subEl.classList.remove('loading');
                        }
                    });
                }
            });
        }

        // --- Animation Loop ---
        function update() {
            if (centralBody) {
                const centralEl = document.getElementById('node-central');
                if (centralEl) {
                    centralEl.style.transform = `translate(${centralBody.position.x}px, ${centralBody.position.y}px) translate(-50%, -50%)`;
                }
            }

            const svg = document.getElementById('lines-svg');
            let svgContent = '';

            dataBodies.forEach(({ body, elementId }) => {
                const el = document.getElementById(elementId);
                if (el) {
                    el.style.transform = `translate(${body.position.x}px, ${body.position.y}px) translate(-50%, -50%)`;
                }

                if (centralBody) {
                    svgContent += `<line x1="${centralBody.position.x}" y1="${centralBody.position.y}" x2="${body.position.x}" y2="${body.position.y}" />`;
                }
            });

            svg.innerHTML = svgContent;
            requestAnimationFrame(update);
        }

        // --- Interaction ---
        function switchCategory(category) {
            if (currentCategory === category) return;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const btns = Array.from(document.querySelectorAll('.nav-btn'));
            const activeBtn = btns.find(b => b.getAttribute('onclick').includes(category));
            if (activeBtn) activeBtn.classList.add('active');

            currentCategory = category;
            createNodes();
        }

        window.onload = () => {
            initPhysics();
            createNodes();
        };

        window.onresize = () => {
            if (centralBody) {
                Matter.Body.setPosition(centralBody, { x: window.innerWidth / 2, y: window.innerHeight / 2 });
                createNodes();
            }
        };

    </script>
</body>
